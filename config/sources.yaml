firecrawl_prompt: >
  Act as an agriculture market intelligence analyst.
  Extract only crop, oilseed, fertiliser, weather, production, trade,
  logistics, export/import, and market-risk information.
  Focus on wheat, maize, corn, barley, sunflower seed, rapeseed,
  soybeans, and fertiliser.
  Focus mainly on the Balkans, European Union, Ukraine, Romania,
  Bulgaria, Serbia, North Macedonia, Greece, and Turkey.
  For each result, extract commodity, country or region, date,
  short summary, price impact, risk type, and business signal.
  Strictly exclude milk, dairy, cheese, butter, cream, whey, yogurt,
  lactose, casein, milk powder, dairy cattle, dairy farms,
  and milk production.

